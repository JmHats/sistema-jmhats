<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Pagos</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- 🔝 MENÚ -->
<nav style="background:#8b5e3c; padding: 15px; text-align: center;">
    <a href="/pagos/index.html" style="color:white; margin: 10px;">Pagos</a>
    <a href="/servicios/index.html" style="color:white; margin: 10px;">Servicios Texanas</a>
</nav>

<!-- 🔥 CONTENEDOR HEADER CON LOGO -->
<div style="position: relative;">

    <h1 style="text-align:center;">SISTEMA DE PAGOS</h1>

    <!-- LOGO ARRIBA DERECHA -->
    <img src="/img/Logo.png" alt="Logo"
        style="position:fixed; top:-100px; right:60px; width:300px; z-index:1000;">

</div>

<!-- CONTENEDOR -->
<div style="display: flex; justify-content: center; gap: 20px; max-width: 900px; margin: auto; flex-wrap: wrap;">

    <!-- FORMULARIO -->
    <div class="container">

        <input id="nombre" placeholder="Nombre">

        <br><br>

        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input id="producto1" placeholder="Producto 1" style="flex:2;">
            <input id="precio1" placeholder="Precio" style="flex:1;">
        </div>

        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input id="producto2" placeholder="Producto 2" style="flex:2;">
            <input id="precio2" placeholder="Precio" style="flex:1;">
        </div>

        <div style="display:flex; gap:10px;">
            <input id="producto3" placeholder="Producto 3" style="flex:2;">
            <input id="precio3" placeholder="Precio" style="flex:1;">
        </div>

        <button onclick="agregarCliente()">Agregar Cliente</button>

    </div>

    <!-- BUSCADOR -->
    <div class="container">

        <input id="busqueda" placeholder="Buscar cliente...">

        <button onclick="cargarClientes()">Buscar</button>
        <button onclick="verTodos()">Todos</button>

    </div>

</div>

<!-- TABLA -->
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Productos</th>
            <th>Fecha</th>
            <th>Deuda</th>
            <th>Pagado</th>
            <th>Saldo</th>
            <th>Pago</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody id="tablaClientes"></tbody>
</table>

<!-- 🔥 MODAL -->
<div id="modalAgregar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

  <div style="background:white; padding:20px; width:400px; margin:100px auto; border-radius:10px;">

    <h3 id="nombreClienteModal"></h3>

    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <input id="m_producto1" placeholder="Producto 1" style="flex:2;">
      <input id="m_precio1" placeholder="Precio" style="flex:1;">
    </div>

    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <input id="m_producto2" placeholder="Producto 2" style="flex:2;">
      <input id="m_precio2" placeholder="Precio" style="flex:1;">
    </div>

    <div style="display:flex; gap:10px;">
      <input id="m_producto3" placeholder="Producto 3" style="flex:2;">
      <input id="m_precio3" placeholder="Precio" style="flex:1;">
    </div>

    <br>

    <button onclick="guardarProductos()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>

  </div>

</div>

<!-- JS -->
<script src="/js/app.js"></script>

</body>
</html>
