<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Sistema Variantes</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        nav{
            background:#8b5e3c;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        nav a{
            color:white;
            margin: 10px;
            text-decoration: none;
        }

        .formulario{
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        input, select{
            padding: 10px;
            width: 220px;
        }

        button{
            padding: 10px 20px;
            border: none;
            background: #3d8536;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th{
            background: #8b5e3c;
            color: white;
        }

        th, td{
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        img{
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

    </style>

</head>

<body>

<nav>

    <a href="/pagos/index.html">Pagos</a>
    <a href="/servicios/index.html">Servicio Texanas</a>
    <a href="/almidonado/index.html">Servicio Almidonado</a>
    <a href="/productos/index.html">Productos</a>
    <a href="/variantes/index.html">Variantes</a>
    <a href="/sucursales/index.html">Sucursales</a>
    <a href="/plataformas/index.html">Plataformas</a>
    <a href="/inventario/index.html">Inventario</a>
    <a href="/catalogo/index.html">Catalogo</a>

</nav>

<h1>Variantes</h1>

<div class="formulario">

    <input
        id="codigoProducto"
        placeholder="Código del producto"
        onkeyup="buscarProducto()"
    >

    <input
        id="nombreProducto"
        placeholder="Producto"
        disabled
    >

    <input id="idProducto" hidden>

    <div class="preview">

        <img
            id="imagenProducto"
            src=""
            style="display:none;"
        >

    </div>

    <!-- VARIANTE -->
    <select
        id="tipoVariante"
        onchange="cambiarTallas()"
    >

        <option value="">
            Selecciona variante
        </option>

        <option>
            Botas Mujer
        </option>

        <option>
            Pantalones Mujer
        </option>

        <option>
            Ropa de hombre
        </option>

        <option>
            Botas de hombre
        </option>

        <option>
            Botas de niño
        </option>

        <option>
            Pantalones de Hombre
        </option>

        <option>
            Texana y Sombrero
        </option>

        <option>
            Otro
        </option>

    </select>

    <!-- COLOR -->
    <input
        id="color"
        placeholder="Color"
    >

    <!-- TALLAS -->
    <select id="talla">

        <option value="">
            Selecciona talla
        </option>

    </select>

    <!-- CANTIDAD OTRO -->
    <input
        type="number"
        id="cantidadOtro"
        placeholder="Cantidad"
        style="display:none;"
        min="1"
    >

    <!-- BOTON -->
    <button onclick="guardarVariante()">

        Guardar Variante

    </button>

</div>

<table>

    <thead>

        <tr>

            <th>ID Variante</th>
            <th>ID Producto</th>
            <th>Imagen</th>
            <th>Producto</th>
            <th>Color</th>
            <th>Talla</th>
            <th>Acción</th>

        </tr>

    </thead>

    <tbody id="lista"></tbody>

</table>

<script src="/variantes/variantes.js"></script>

</body>
</html>
