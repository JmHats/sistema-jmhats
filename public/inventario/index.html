<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Sistema Inventario</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        /* ======================
           NAV
        ====================== */

        nav{
            background:#8b5e3c;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        nav a{
            color:white;
            margin: 10px;
            text-decoration: none;
            font-weight: normal;
        }

        nav a:hover{
            text-decoration: underline;
        }

        /* ======================
           FORMULARIO
        ====================== */

        .formulario{

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 20px;

            display: flex;

            flex-wrap: wrap;

            justify-content: center;

            align-items: center;

            gap: 10px;

        }

        input,
        select{

            padding: 10px;

            width: 220px;

            border: 1px solid #ccc;

            border-radius: 5px;

        }

        button{

            padding: 10px 20px;

            border: none;

            background: #3d8536;

            color: white;

            cursor: pointer;

            border-radius: 5px;

            font-weight: bold;

        }

        button:hover{
            opacity: 0.9;
        }

        .guardar{
            background:#3d8536;
        }

        .editar{
            background:#d48b00;
        }

        .eliminar{
            background:red;
        }

        table{

            width: 100%;

            border-collapse: collapse;

            background: white;

            border-radius: 10px;

            overflow: hidden;

        }

        th{

            background: #8b5e3c;

            color: white;

        }

        th,
        td{

            padding: 10px;

            border: 1px solid #ddd;

            text-align: center;

        }

        img{

            width: 80px;

            height: 80px;

            object-fit: cover;

            border-radius: 5px;

        }

        .preview{

            display:flex;

            justify-content:center;

            align-items:center;

            width:100%;

        }

    </style>

</head>

<body>

    <!-- ======================
         NAV
    ====================== -->

    <nav>

        <a href="/pagos/index.html">Pagos</a>

        <a href="/servicios/index.html">
            Servicio Texanas
        </a>

        <a href="/almidonado/index.html">
            Servicio Almidonado
        </a>

        <a href="/productos/index.html">
            Productos
        </a>

        <a href="/variantes/index.html">
            Variantes
        </a>

        <a href="/sucursales/index.html">
            Sucursales
        </a>

        <a href="/plataformas/index.html">
            Plataformas
        </a>

        <a href="/inventario/index.html">
            Inventario
        </a>

        <a href="/catalogo/index.html">
            Catalogo
        </a>

    </nav>

    <!-- ======================
         TITULO
    ====================== -->

    <h1>Inventario</h1>

    <!-- ======================
         FORMULARIO
    ====================== -->

    <div class="formulario">

        <input
            id="codigoProducto"
            placeholder="Código del producto"
            onkeyup="buscarProducto()"
        >

        <input
            id="nombreProducto"
            placeholder="Producto"
            disabled
        >

        <input
            id="idProducto"
            hidden
        >

        <input
            id="idInventario"
            hidden
        >

        <div class="preview">

            <img
                id="imagenProducto"
                src=""
                style="display:none;"
            >

        </div>

        <select id="variante">

            <option value="">
                Selecciona Variante
            </option>

        </select>

        <select id="sucursal">

            <option value="">
                Selecciona Sucursal
            </option>

        </select>

        <input
            type="number"
            id="stock"
            placeholder="Cantidad"
        >

        <button
            class="guardar"
            onclick="guardarInventario()"
        >
            Guardar
        </button>

    </div>

    <!-- ======================
         TABLA
    ====================== -->

    <table>

        <thead>

            <tr>

                <th>ID</th>
                <th>Imagen</th>
                <th>Producto</th>
                <th>Variante</th>
                <th>Sucursal</th>
                <th>Stock</th>
                <th>Agregar</th>
                <th>Quitar</th>
                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="lista"></tbody>

    </table>

    <!-- ======================
         JS
    ====================== -->

    <script src="/inventario/inventario.js"></script>

</body>

</html>
