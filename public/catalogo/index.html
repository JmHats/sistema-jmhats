<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Catálogo</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1{
            text-align: center;
        }

        nav{
            background:#8b5e3c;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            margin:10px;
            text-decoration:none;
            font-weight: normal;
        }

        .buscador-container{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-top:20px;
            flex-wrap:wrap;
        }

        .buscador{
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            width:220px;
        }

        .btn-buscar{
            background:#8b5e3c;
            color:white;
            border:none;
            border-radius:8px;
            padding:10px 20px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            margin-top:20px;
        }

        th{
            background:#8b5e3c;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        img{
            width:70px;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        img:hover{
            transform:scale(1.05);
        }

        .modal{
            display:none;
            position:fixed;
            z-index:9999;
            left:0;
            top:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.95);
            justify-content:center;
            align-items:center;
        }

        .modal-contenido{
            max-width:95%;
            max-height:95%;
        }

        .cerrar{
            position:absolute;
            top:20px;
            right:30px;
            color:white;
            font-size:40px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<nav>

    <a href="/pagos/index.html">Pagos</a>
    <a href="/servicios/index.html">Servicio Texanas</a>
    <a href="/almidonado/index.html">Servicio Almidonado</a>
    <a href="/productos/index.html">Productos</a>
    <a href="/variantes/index.html">Variantes</a>
    <a href="/sucursales/index.html">Sucursales</a>
    <a href="/plataformas/index.html">Plataformas</a>
    <a href="/inventario/index.html">Inventario</a>
    <a href="#">Catálogo</a>

</nav>

<h1>Catálogo de Inventario</h1>

<div class="buscador-container">

    <input
        type="text"
        id="buscadorNombre"
        class="buscador"
        placeholder="Buscar nombre..."
    >

    <input
        type="text"
        id="buscadorCategoria"
        class="buscador"
        placeholder="Buscar categoría..."
    >

    <select
        id="buscadorSexo"
        class="buscador"
    >

        <option value="">Sexo</option>
        <option value="mujer">Mujer</option>
        <option value="hombre">Hombre</option>
        <option value="niño">Niño</option>

    </select>

    <input
        type="text"
        id="buscadorTalla"
        class="buscador"
        placeholder="Buscar talla..."
    >

    <button
        class="btn-buscar"
        onclick="buscar()"
    >
        Buscar
    </button>

</div>

<table>

    <thead>

        <tr>

            <th>ID</th>
            <th>Imagen</th>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Variante</th>
            <th>Sucursal</th>
            <th>Stock</th>
            <th>Plataformas</th>

        </tr>

    </thead>

    <tbody id="listaCatalogo"></tbody>

</table>

<!-- MODAL -->

<div id="modalImagen" class="modal">

    <span
        class="cerrar"
        id="cerrarModal"
    >
        &times;
    </span>

    <img
        class="modal-contenido"
        id="imagenGrande"
    >

</div>

<script>

let datosGlobales = [];

// ======================
// CARGAR CATALOGO
// ======================

async function cargarCatalogo() {

    try {

        const res =
            await fetch('/api/inventario');

        const data =
            await res.json();

        datosGlobales = data;

        mostrarDatos(data);

    } catch (error) {

        console.log(error);

    }

}

// ======================
// MOSTRAR DATOS
// ======================

function mostrarDatos(data) {

    const lista =
        document.getElementById('listaCatalogo');

    lista.innerHTML = '';

    data.forEach(item => {

        let plataformas = [];

        if (item.mercado_libre == 1) {
            plataformas.push('Mercado Libre');
        }

        if (item.tiktok == 1) {
            plataformas.push('TikTok');
        }

        if (item.web == 1) {
            plataformas.push('Web');
        }

        const tr =
            document.createElement('tr');

        tr.innerHTML = `

            <td>${item.id_inventario}</td>

            <td>

                <img
                    src="/uploads/${item.imagen}"
                    class="img-producto"
                >

            </td>

            <td>${item.nombre || ''}</td>

            <td>${item.categoria || ''}</td>

            <td>

                ${item.color || ''}
                -
                ${item.talla || ''}

            </td>

            <td>${item.sucursal || ''}</td>

            <td>${item.stock || 0}</td>

            <td>

                ${plataformas.length > 0
                    ? plataformas.join(', ')
                    : 'Sin plataformas'}

            </td>

        `;

        lista.appendChild(tr);

    });

    document
    .querySelectorAll('.img-producto')
    .forEach(img => {

        img.addEventListener('click', function () {

            abrirImagen(this.src);

        });

    });

}

// ======================
// BUSCAR
// ======================

function buscar() {

    const nombre =
        document.getElementById('buscadorNombre')
        .value
        .trim()
        .toLowerCase();

    const categoria =
        document.getElementById('buscadorCategoria')
        .value
        .trim()
        .toLowerCase();

    const sexo =
        document.getElementById('buscadorSexo')
        .value
        .trim()
        .toLowerCase();

    const talla =
        document.getElementById('buscadorTalla')
        .value
        .trim()
        .toLowerCase();

    const filtrado =
        datosGlobales.filter(item => {

            const nombreProducto =
                (item.nombre || '')
                .toLowerCase();

            const categoriaProducto =
                (item.categoria || '')
                .toLowerCase();

            const generoProducto =
                (item.genero || '')
                .toLowerCase();

            const tallaProducto =
                String(item.talla || '')
                .toLowerCase();

            const coincideNombre =
                nombreProducto.includes(nombre);

            const coincideCategoria =
                categoriaProducto.includes(categoria);

            const coincideSexo =
                !sexo ||
                generoProducto.includes(sexo);

            const coincideTalla =
                !talla ||
                tallaProducto.includes(talla);

            return (

                coincideNombre &&
                coincideCategoria &&
                coincideSexo &&
                coincideTalla

            );

        });

    mostrarDatos(filtrado);

}

// ======================
// EVENTOS
// ======================

document
.getElementById('buscadorNombre')
.addEventListener('keyup', buscar);

document
.getElementById('buscadorCategoria')
.addEventListener('keyup', buscar);

document
.getElementById('buscadorSexo')
.addEventListener('change', buscar);

document
.getElementById('buscadorTalla')
.addEventListener('keyup', buscar);

// ======================
// MODAL
// ======================

function abrirImagen(src) {

    document
    .getElementById('imagenGrande')
    .src = src;

    document
    .getElementById('modalImagen')
    .style.display = 'flex';

}

function cerrarImagen() {

    document
    .getElementById('modalImagen')
    .style.display = 'none';

}

document
.getElementById('cerrarModal')
.addEventListener('click', cerrarImagen);

document
.getElementById('modalImagen')
.addEventListener('click', function(e){

    if(e.target === this){

        cerrarImagen();

    }

});

// ======================
// INICIO
// ======================

window.onload = cargarCatalogo;

</script>

</body>
</html>
