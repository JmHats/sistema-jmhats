<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Servicios</title>

<link rel="stylesheet" href="/css/style.css">

<style>
body { font-family: Arial; }

.container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.row label { width: 80px; }

input { flex: 1; padding: 5px; }

h3 { margin-top: 20px; }

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
}

<nav style="background:#8b5e3c; padding: 15px; text-align: center;">

<h1 style="text-align:center;">SERVICIOS TEXANAS</h1>

<div class="container">

<div class="row">
    <label>Nombre:</label>
    <input id="nombre">
</div>

<div class="row">
    <label>Tel:</label>
    <input id="numero">
</div>

<!-- ===== TEXANA 1 ===== -->
<h3>Texana 1</h3>
<input id="texana1" placeholder="Modelo">
<input id="horma1" placeholder="Horma">

<div>
<label><input type="checkbox" value="200" class="servicio1"> Limpieza</label><br>
<label><input type="checkbox" value="150" class="servicio1"> Horma</label><br>
<label><input type="checkbox" value="350" class="servicio1"> Limpieza y Horma</label><br>

<label><input type="checkbox" id="herraje1_check"> Herraje</label>
<input type="number" id="herraje1" placeholder="Letras"><br>

<label><input type="checkbox" id="extra1_check"> Extra</label>
<input type="text" id="extra1_nombre" placeholder="Nombre">
<input type="number" id="extra1_precio" placeholder="Precio">
</div>

<label><input type="checkbox" id="extra3_check"> Extra</label>
<input type="text" id="extra3_nombre">

<h2>Total: $<span id="total">0</span></h2>

<button onclick="calcularTotal()">Calcular</button>
