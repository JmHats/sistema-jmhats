<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Servicios</title>

<link rel="stylesheet" href="/css/style.css">

<style>
body {
    font-family: Arial;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.row label {
    width: 80px;
}

input {
    flex: 1;
    padding: 5px;
}

h3 {
    margin-top: 20px;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
}
</style>
</head>

<body>

<nav style="background:#8b5e3c; padding: 15px; text-align: center;">
    <a href="/pagos/index.html" style="color:white; margin: 10px;">Pagos</a>
    <a href="/servicios/index.html" style="color:white; margin: 10px;">Servicios Texanas</a>
</nav>

<h1 style="text-align:center;">SERVICIOS TEXANAS</h1>
<img src="/img/Logo.png" alt="Logo"
        style="position:fixed; top:-100px; right:60px; width:300px; z-index:1000;">

<div class="container">

    <div class="row">
        <label>Nombre:</label>
        <input id="nombre">
    </div>

    <div class="row">
        <label>Tel:</label>
        <input id="numero">
    </div>

    <!-- TEXANA 1 -->
    <h3>Texana 1</h3>
    <input id="texana1" placeholder="Modelo">
    <input id="horma1" placeholder="Horma">

    <div>
        <label><input type="checkbox" value="150" class="servicio1"> Limpieza</label><br>
        <label><input type="checkbox" value="100" class="servicio1"> Horma</label><br>
        <label><input type="checkbox" value="350" class="servicio1"> Limpieza y Horma</label><br>
        <label><input type="checkbox" value="80" class="servicio1"> Corte</label><br>
        <label><input type="checkbox" value="200" class="servicio1"> Goma</label><br>
        <label><input type="checkbox" value="50" class="servicio1"> Esponja</label><br>
        <label><input type="checkbox" value="30" class="servicio1"> Herraje x letra</label>
    </div>

    <!-- TEXANA 2 -->
    <h3>Texana 2</h3>
    <input id="texana2" placeholder="Modelo">
    <input id="horma2" placeholder="Horma">

    <div>
        <label><input type="checkbox" value="150" class="servicio2"> Limpieza</label><br>
        <label><input type="checkbox" value="100" class="servicio2"> Horma</label><br>
        <label><input type="checkbox" value="350" class="servicio2"> Limpieza y Horma</label><br>
        <label><input type="checkbox" value="80" class="servicio2"> Corte</label><br>
        <label><input type="checkbox" value="200" class="servicio2"> Goma</label><br>
        <label><input type="checkbox" value="50" class="servicio2"> Esponja</label><br>
        <label><input type="checkbox" value="30" class="servicio2"> Herraje x letra</label>
    </div>

    <!-- TEXANA 3 -->
    <h3>Texana 3</h3>
    <input id="texana3" placeholder="Modelo">
    <input id="horma3" placeholder="Horma">

    <div>
        <label><input type="checkbox" value="150" class="servicio3"> Limpieza</label><br>
        <label><input type="checkbox" value="100" class="servicio3"> Horma</label><br>
        <label><input type="checkbox" value="350" class="servicio3"> Limpieza y Horma</label><br>
        <label><input type="checkbox" value="80" class="servicio3"> Corte</label><br>
        <label><input type="checkbox" value="200" class="servicio3"> Goma</label><br>
        <label><input type="checkbox" value="50" class="servicio3"> Esponja</label><br>
        <label><input type="checkbox" value="30" class="servicio3"> Herraje x letra</label>
    </div>

    <h2>Total: $<span id="total">0</span></h2>

    <button onclick="calcularTotal()">Calcular Total</button>
    <button onclick="imprimirTicket()">🧾 Imprimir Ticket</button>

</div>

<script src="/servicios/servicios.js"></script>

</body>
</html>
